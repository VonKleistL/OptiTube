name: Test Suite

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "**.swift"
      - "**.xcodeproj/**"
      - "**.xcworkspace/**"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.swift"
      - "**.xcodeproj/**"
      - "**.xcworkspace/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  macos_unit_tests:
    name: macOS Unit Tests
    timeout-minutes: 20
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project OptiTube.xcodeproj \
            -scheme OptiTube \
            -destination 'platform=macOS' \
            -derivedDataPath ./build \
            -only-testing:OptiTubeTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: macOS-TestResults
          path: ./build/*.xcresult
          retention-days: 7

  macos_ui_tests:
    name: macOS UI Tests
    timeout-minutes: 30
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild \
            -project OptiTube.xcodeproj \
            -scheme OptiTube \
            -destination 'platform=macOS' \
            -derivedDataPath ./build \
            -only-testing:OptiTubeUITests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: macOS-UITestResults
          path: ./build/*.xcresult
          retention-days: 7
